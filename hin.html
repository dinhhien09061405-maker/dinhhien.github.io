<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Hiền</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: linear-gradient(135deg, #f8d7d0, #f5eee6);
  padding: 30px;
}

.container {
  max-width: 1100px;
  margin: auto;
  display: grid;
  grid-template-columns: 300px 1fr;
  gap: 20px;
}

/* LEFT */
.left {
  background: linear-gradient(180deg, #ff9a9e, #fad0c4);
  border-radius: 20px;
  padding: 30px;
  text-align: center;
  color: white;
  height: fit-content;
}

.avatar {
  width: 140px;
  height: 140px;
  border-radius: 50%;
  border: 5px solid white;
  object-fit: cover;
  margin-bottom: 15px;
  background-color: #fff; 
}

.name {
  font-size: 20px;
  font-weight: 600;
}

/* CARD */
.card {
  background: white;
  padding: 20px;
  border-radius: 20px;
  margin-bottom: 20px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

.card h3 {
  margin-bottom: 10px;
  color: #ff6b6b;
}

.card i {
  margin-right: 8px;
}

/* SKILL */
.skill {
  margin-bottom: 10px;
}

.bar {
  height: 8px;
  background: #eee;
  border-radius: 10px;
  overflow: hidden;
}

.bar span {
  display: block;
  height: 100%;
  background: #ff6b6b;
}

/* RIGHT */
.right {
  display: flex;
  flex-direction: column;
}

/* LINK */
.contact a {
  text-decoration: none;
  color: #333;
}

.contact a:hover {
  color: #ff6b6b;
}
</style>
</head>

<body>

<div class="container">

  <div class="left">
    <img src="https://raw.githubusercontent.com/dinhhien09061405-maker/dinhhien.github.io/main/Avatar.jpg" class="avatar" alt="Avatar">
    <div class="name">Đinh Thị Hiền</div>
  </div>

  <div class="right">

    <div class="card">
      <h3><i class="fa fa-user"></i> Giới thiệu</h3>
      <p>📅 14/05/2006</p>
      <p>📍 Mỹ Hào, Hưng Yên</p>
    </div>

    <div class="card">
      <h3><i class="fa fa-graduation-cap"></i> Học vấn</h3>
      <p>⭐ GPA 12: 9.5</p>
      <p>🏫 ĐH Ngoại Thương</p>
    </div>

    <div class="card">
      <h3><i class="fa fa-star"></i> Kỹ năng</h3>

      <div class="skill">
        Giao tiếp
        <div class="bar"><span style="width:90%"></span></div>
      </div>

      <div class="skill">
        Thuyết trình
        <div class="bar"><span style="width:80%"></span></div>
      </div>

      <div class="skill">
        Làm việc nhóm
        <div class="bar"><span style="width:85%"></span></div>
      </div>

    </div>

    <div class="card contact">
      <h3><i class="fa fa-phone"></i> Liên hệ</h3>
      <p>📞 0969820714</p>
      <p>📧 dinhhien09061405@gmail.com</p>
      <p>
        <i class="fab fa-facebook"></i>
        <a href="https://www.facebook.com/inhhien.180941" target="_blank">
          Facebook của tôi
        </a>
      </p>
    </div>

  </div>

</div>

</body>
</html>
