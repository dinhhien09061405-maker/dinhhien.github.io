<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Hiền</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: linear-gradient(135deg, #f8d7d0, #f5eee6);
  padding: 30px;
}

.container {
  max-width: 1100px;
  margin: auto;
  display: grid;
  grid-template-columns: 300px 1fr;
  gap: 20px;
}

/* =========================================
   LEFT SIDEBAR (Khối bên trái)
   ========================================= */
.left {
  background: linear-gradient(180deg, #ff9a9e, #fad0c4);
  border-radius: 20px;
  padding: 30px;
  text-align: center;
  color: white;
  height: fit-content;
  box-shadow: 0 8px 20px rgba(0,0,0,0.1); /* Đổ bóng nhẹ ban đầu */
  
  /* --- BẮT ĐẦU PHẦN HIỆU ỨNG --- */
  transition: all 0.3s ease; /* Tạo chuyển động mượt mà cho mọi thay đổi */
  cursor: pointer; /* Biến con trỏ chuột thành hình bàn tay khi rê vào */
}

/* 1. Hiệu ứng khi Rê chuột vào khối bên trái */
.left:hover {
  transform: translateY(-8px); /* Nhấc khối lên cao 8px */
  box-shadow: 0 15px 30px rgba(255, 107, 107, 0.2); /* Bóng đổ đậm và rộng hơn, màu hồng nhẹ */
}

/* 2. Hiệu ứng khi Ấn giữ chuột vào khối bên trái */
.left:active {
  transform: translateY(-2px) scale(0.98); /* Hạ xuống một chút và thu nhỏ 2% */
  box-shadow: 0 5px 10px rgba(0,0,0,0.2); /* Bóng đổ xẹp xuống */
}
/* --- KẾT THÚC PHẦN HIỆU ỨNG --- */


.avatar {
  width: 140px;
  height: 140px;
  border-radius: 50%;
  border: 5px solid white;
  object-fit: cover;
  margin-bottom: 15px;
  background-color: #fff;
  transition: transform 0.5s ease; /* Hiệu ứng riêng cho ảnh */
}

/* Hiệu ứng xoay nhẹ ảnh đại diện khi rê chuột vào khối lớn */
.left:hover .avatar {
    transform: rotate(5deg);
}

.name {
  font-size: 20px;
  font-weight: 600;
}

/* =========================================
   RIGHT CONTENT (Các khối bên phải)
   ========================================= */
.right {
  display: flex;
  flex-direction: column;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 20px;
  margin-bottom: 20px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.08); /* Đổ bóng nhẹ ban đầu */
  
  /* --- BẮT ĐẦU PHẦN HIỆU ỨNG --- */
  transition: all 0.3s ease; /* Tạo chuyển động mượt mà */
  cursor: pointer; /* Biến con trỏ chuột thành hình bàn tay */
}

/* 1. Hiệu ứng khi Rê chuột vào các khối bên phải */
.card:hover {
  transform: translateY(-5px); /* Nhấc khối lên cao 5px */
  box-shadow: 0 12px 25px rgba(0,0,0,0.12); /* Bóng đổ đậm hơn */
}

/* 2. Hiệu ứng khi Ấn giữ chuột vào các khối bên phải */
.card:active {
  transform: translateY(-1px) scale(0.99); /* Hạ xuống và thu nhỏ 1% */
  box-shadow: 0 4px 8px rgba(0,0,0,0.1); /* Bóng đổ xẹp xuống */
}
/* --- KẾT THÚC PHẦN HIỆU ỨNG --- */


.card h3 {
  margin-bottom: 10px;
  color: #ff6b6b;
}

.card i {
  margin-right: 8px;
}

/* SKILL BAR */
.skill {
  margin-bottom: 10px;
}

.bar {
  height: 8px;
  background: #eee;
  border-radius: 10px;
  overflow: hidden;
}

.bar span {
  display: block;
  height: 100%;
  background: #ff6b6b;
}

/* CONTACT LINK */
.contact a {
  text-decoration: none;
  color: #333;
}

.contact a:hover {
  color: #ff6b6b;
  text-decoration: underline; /* Thêm gạch chân khi rê vào link */
}
</style>
</head>

<body>

<div class="container">

  <div class="left">
    <img src="https://raw.githubusercontent.com/dinhhien09061405-maker/dinhhien.github.io/main/Avatar.jpg" class="avatar" alt="Avatar">
    <div class="name">Đinh Thị Hiền</div>
  </div>

  <div class="right">

    <div class="card">
      <h3><i class="fa fa-user"></i> Giới thiệu</h3>
      <p>📅 14/05/2006</p>
      <p>📍 Mỹ Hào, Hưng Yên</p>
    </div>

    <div class="card">
      <h3><i class="fa fa-graduation-cap"></i> Học vấn</h3>
      <p>⭐ GPA 12: 9.5</p>
      <p>🏫 ĐH Ngoại Thương</p>
    </div>

    <div class="card">
      <h3><i class="fa fa-star"></i> Kỹ năng</h3>

      <div class="skill">
        Giao tiếp
        <div class="bar"><span style="width:90%"></span></div>
      </div>

      <div class="skill">
        Thuyết trình
        <div class="bar"><span style="width:80%"></span></div>
      </div>

      <div class="skill">
        Làm việc nhóm
        <div class="bar"><span style="width:85%"></span></div>
      </div>

    </div>

    <div class="card contact">
      <h3><i class="fa fa-phone"></i> Liên hệ</h3>
      <p>📞 0969820714</p>
      <p>📧 dinhhien09061405@gmail.com</p>
      <p>
        <i class="fab fa-facebook"></i>
        <a href="https://www.facebook.com/inhhien.180941" target="_blank">
          Facebook của tôi
        </a>
      </p>
    </div>

  </div>

</div>

</body>
</html>
